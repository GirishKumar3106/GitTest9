<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network Path Visualizer</title>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            color: #333;
        }

        .header {
            background-color: #ffffff;
            padding: 15px 30px;
            border-bottom: 1px solid #e1e4e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .controls {
            background-color: #ffffff;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #e1e4e8;
            align-items: center;
            flex-wrap: wrap;
        }

        select,
        button,
        input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            background-color: #000;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }

        button:hover {
            background-color: #333;
        }

        .btn-secondary {
            background-color: #28a745;
        }

        .btn-secondary:hover {
            background-color: #218838;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 30px;
        }

        #network-container {
            width: 100%;
            max-width: 1000px;
            position: relative;
        }

        #network {
            width: 100%;
            height: 500px;
            background-color: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
        }

        .info-container {
            width: 100%;
            max-width: 1000px;
            background-color: #ffffff;
            padding: 20px 30px;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            box-sizing: border-box;
            display: none;
        }

        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            display: none;
            z-index: 10;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="title">NETWORK_ROUTER.</div>
    <div style="font-size:14px;color:#666;">
        Social Connection Shortest Path
    </div>
</div>

<div class="controls">

    <div>
        <label for="startNode">
            Start Person:
        </label>

        <select id="startNode">
            {% for node in nodes %}
            <option value="{{ node }}">
                {{ node }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="endNode">
            Target Person:
        </label>

        <select id="endNode">
            {% for node in nodes %}
            <option value="{{ node }}">
                {{ node }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label for="algorithm">
            Algorithm:
        </label>

        <select id="algorithm">
            <option value="dijkstra">
                Dijkstra Search
            </option>

            <option value="astar">
                A* Search
            </option>

            <option value="idastar">
                IDA* Search
            </option>
        </select>
    </div>

    <button onclick="findPath()">
        Calculate Path
    </button>

</div>

<div class="controls" style="background-color:#fafbfc;">

    <div style="font-weight:bold;margin-right:10px;">
        Add New Data:
    </div>

    <datalist id="existingNodes">
        {% for node in nodes %}
        <option value="{{ node }}">
        {% endfor %}
    </datalist>

    <div>
        <input
            type="text"
            id="newPerson1"
            list="existingNodes"
            placeholder="Person A"
            autocomplete="off">
    </div>

    <div>
        <span style="color:#666;">
            connects to
        </span>
    </div>

    <div>
        <input
            type="text"
            id="newPerson2"
            list="existingNodes"
            placeholder="Person B"
            autocomplete="off">
    </div>

    <div>
        <input
            type="number"
            id="weight"
            min="1"
            value="1"
            placeholder="Weight">
    </div>

    <button
        class="btn-secondary"
        onclick="addConnection()">
        Add Connection
    </button>

</div>
<div class="main-container">

    <div id="network-container">

        <div id="network"></div>

        <div
            id="status"
            class="status-bar">
        </div>

    </div>

    <div
        class="info-container"
        id="algoInfo">

        <h3>
            Algorithm Properties
        </h3>

        <p>
            <strong>
                Time Complexity:
            </strong>
            <span id="propTime"></span>
        </p>

        <p>
            <strong>
                Completeness:
            </strong>
            <span id="propComplete"></span>
        </p>

        <p>
            <strong>
                Optimality:
            </strong>
            <span id="propOptimal"></span>
        </p>

    </div>

</div>

<script>

let network = null;

let nodesData =
    new vis.DataSet([]);

let edgesData =
    new vis.DataSet([]);


window.onload = function () {

    fetch('/get_graph')

        .then(response =>
            response.json())

        .then(data => {

            let addedNodes =
                new Set();

            let edges = [];

            for (let node in data) {

                if (
                    !addedNodes.has(node)
                ) {

                    nodesData.add({

                        id: node,
                        label: node,
                        color: '#97C2FC'

                    });

                    addedNodes.add(node);

                }

                for (
                    let neighbor
                    in data[node]
                ) {

                    if (
                        !addedNodes.has(
                            neighbor
                        )
                    ) {

                        nodesData.add({

                            id: neighbor,
                            label: neighbor,
                            color: '#97C2FC'

                        });

                        addedNodes.add(
                            neighbor
                        );

                    }

                    let edgeId =
                        [node, neighbor]
                        .sort()
                        .join('-');

                    if (
                        !edges.some(
                            e =>
                            e.id ===
                            edgeId
                        )
                    ) {

                        edges.push({

                            id: edgeId,

                            from: node,

                            to: neighbor,

                            label: String(
                                data[node][neighbor]
                            ),

                            color: '#cccccc',

                            font: {
                                align:
                                    'middle'
                            }

                        });

                    }

                }

            }

            edgesData.add(edges);

            drawNetwork();

        });

};


function drawNetwork() {

    const container =
        document.getElementById(
            'network'
        );

    const data = {

        nodes: nodesData,

        edges: edgesData

    };

    const options = {

        nodes: {

            shape: 'dot',

            size: 20,

            font: {
                size: 16
            }

        },

        edges: {

            font: {
                size: 16
            }

        },

        physics: {

            forceAtlas2Based: {

                gravitationalConstant:
                    -50,

                centralGravity:
                    0.01,

                springLength:
                    100

            },

            solver:
                'forceAtlas2Based'

        }

    };

    network =
        new vis.Network(
            container,
            data,
            options
        );

}


function addConnection() {

    const p1 =
        document
        .getElementById(
            'newPerson1'
        )
        .value
        .trim();

    const p2 =
        document
        .getElementById(
            'newPerson2'
        )
        .value
        .trim();

    const weight =
        parseInt(
            document
            .getElementById(
                'weight'
            )
            .value
        ) || 1;

    if (!p1 || !p2) {

        alert(
            'You must enter names in both boxes.'
        );

        return;
    }

    if (p1 === p2) {

        alert(
            'A person cannot connect to themselves.'
        );

        return;
    }

    fetch(
        '/add_connection',
        {

            method: 'POST',

            headers: {

                'Content-Type':
                    'application/json'

            },

            body:
                JSON.stringify({

                    person1: p1,

                    person2: p2,

                    weight: weight

                })

        }
    )

    .then(response =>
        response.json())

    .then(data => {

        if (
            data.success
        ) {

            window.location.reload();

        }

        else {

            alert(
                data.error
            );

        }

    });

}
function findPath() {

    const start =
        document.getElementById(
            'startNode'
        ).value;

    const end =
        document.getElementById(
            'endNode'
        ).value;

    const algorithm =
        document.getElementById(
            'algorithm'
        ).value;

    const statusDiv =
        document.getElementById(
            'status'
        );

    const infoDiv =
        document.getElementById(
            'algoInfo'
        );

    if (start === end) {

        statusDiv.innerText =
            'Start and Target are the same person.';

        statusDiv.style.display =
            'block';

        return;
    }

    nodesData.forEach(node => {

        nodesData.update({

            id: node.id,

            color: '#97C2FC'

        });

    });

    edgesData.forEach(edge => {

        edgesData.update({

            id: edge.id,

            color: '#cccccc',

            width: 1

        });

    });

    fetch('/find_path', {

        method: 'POST',

        headers: {

            'Content-Type':
                'application/json'

        },

        body:
            JSON.stringify({

                start: start,

                end: end,

                algorithm: algorithm

            })

    })

    .then(response =>
        response.json())

    .then(data => {

        const path =
            data.path;

        infoDiv.style.display =
            'block';

        document.getElementById(
            'propTime'
        ).innerText =
            data.properties.time;

        document.getElementById(
            'propComplete'
        ).innerText =
            data.properties.complete;

        document.getElementById(
            'propOptimal'
        ).innerText =
            data.properties.optimal;

        if (
            path.length === 0
        ) {

            statusDiv.innerText =
                'No connection found.';

            statusDiv.style.display =
                'block';

            return;
        }

        statusDiv.innerText =
            `Path Cost: ${data.cost} (${algorithm.toUpperCase()})`;

        statusDiv.style.display =
            'block';

        let i = 0;

        function animateNextStep() {

            if (
                i < path.length
            ) {

                nodesData.update({

                    id: path[i],

                    color: '#ff5722'

                });

                if (i > 0) {

                    let edgeId1 =
                        `${path[i - 1]}-${path[i]}`;

                    let edgeId2 =
                        `${path[i]}-${path[i - 1]}`;

                    let existingEdge =
                        edgesData.get(edgeId1)
                        ||
                        edgesData.get(edgeId2);

                    if (
                        existingEdge
                    ) {

                        edgesData.update({

                            id:
                                existingEdge.id,

                            color:
                                '#ff5722',

                            width:
                                4,

                            font: {

                                size: 18

                            }

                        });

                    }

                }

                i++;

                setTimeout(
                    animateNextStep,
                    500
                );

            }

        }

        animateNextStep();

    });

}

</script>

</body>
</html>
